name: Request Unity Activation File

# One-time workflow to obtain a Unity Personal license activation file.
#
# Steps:
#   1. Run this workflow manually (Actions tab -> Run workflow).
#   2. Download the "Manual Activation File" artifact from the run summary.
#   3. Upload the .alf at https://license.unity3d.com/manual to receive a .ulf.
#   4. Open the .ulf, copy its full contents.
#   5. Add a repository secret named UNITY_LICENSE with the .ulf contents.
#   6. Delete this workflow file once UNITY_LICENSE is set.

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request manual activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2022.3.62f3

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          if-no-files-found: error
          retention-days: 1
