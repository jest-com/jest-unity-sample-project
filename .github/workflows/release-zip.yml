name: Build & Package WebGL

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  UNITY_VERSION: 2022.3.62f3
  TARGET_PLATFORM: WebGL
  ZIP_NAME: jest-unity-sample-project
  ZIP_INNER_DIR: jest-unity-sample-project

jobs:
  build:
    name: Headless Unity WebGL Build
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-${{ env.TARGET_PLATFORM }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-${{ env.TARGET_PLATFORM }}-
            Library-${{ env.UNITY_VERSION }}-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ env.TARGET_PLATFORM }}
          buildsPath: build

      - name: Locate WebGL output
        id: webgl
        run: |
          set -euxo pipefail
          INDEX=$(find build -name index.html -type f | head -1)
          test -n "$INDEX" || { echo "No index.html under build/"; ls -laR build || true; exit 1; }
          WEBGL_DIR=$(dirname "$INDEX")
          echo "dir=$WEBGL_DIR" >> "$GITHUB_OUTPUT"
          ls -la "$WEBGL_DIR"

      - name: Stage and zip
        run: |
          set -euxo pipefail
          mkdir -p "staging/${ZIP_INNER_DIR}"
          cp -r "${{ steps.webgl.outputs.dir }}/." "staging/${ZIP_INNER_DIR}/"
          (cd staging && zip -r "../${ZIP_NAME}.zip" "${ZIP_INNER_DIR}")

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}.zip
          fail_on_unmatched_files: true
